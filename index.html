<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio KSF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #04060a; --panel: #080d14; --border: #0f1b2d;
      --accent: #00d4ff; --accent2: #ff3c5f; --dim: #1a2a3a;
      --text: #a8c4d8; --bright: #e0f4ff; --glow: rgba(0,212,255,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; overflow: hidden; user-select: none; }
    body::after { content:''; position:fixed; inset:0; z-index:100; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px); }
    .bg-glow { position:fixed; top:-40%; left:50%; transform:translateX(-50%); width:700px; height:700px; border-radius:50%; pointer-events:none; z-index:0; background:radial-gradient(circle,rgba(0,212,255,0.05) 0%,transparent 70%); }
    .stage { position:relative; z-index:2; height:100vh; display:grid; place-items:center; padding:16px; }
    .radio { width:100%; max-width:480px; border:1px solid var(--border); background:var(--panel); position:relative; box-shadow:0 0 0 1px #0a1520,0 32px 80px rgba(0,0,0,.8); }
    .radio::before,.radio::after,.corner-bl,.corner-br { content:''; position:absolute; width:10px; height:10px; border-color:var(--accent); border-style:solid; z-index:1; }
    .radio::before { top:-1px; left:-1px; border-width:2px 0 0 2px; }
    .radio::after  { top:-1px; right:-1px; border-width:2px 2px 0 0; }
    .corner-bl { bottom:-1px; left:-1px; border-width:0 0 2px 2px; }
    .corner-br { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }
    .radio-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 10px; border-bottom:1px solid var(--border); }
    .station-id { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:.1em; color:var(--accent); line-height:1; text-shadow:0 0 20px var(--accent),0 0 40px rgba(0,212,255,.3); }
    .header-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
    .live-badge { display:flex; align-items:center; gap:5px; font-size:9px; letter-spacing:.18em; color:var(--accent2); text-transform:uppercase; }
    .live-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); animation:blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .freq { font-size:10px; color:var(--dim); letter-spacing:.1em; }
    .waveform { height:56px; display:flex; align-items:center; justify-content:center; gap:2px; padding:0 20px; background:#030507; border-bottom:1px solid var(--border); overflow:hidden; }
    .wbar { flex:1; max-width:5px; border-radius:1px; background:var(--accent); opacity:.6; animation:wave var(--d,.8s) ease-in-out infinite alternate; animation-play-state:paused; height:3px; }
    .wbar:nth-child(even) { background:rgba(0,212,255,.4); }
    .playing .wbar { animation-play-state:running; }
    @keyframes wave { to { height:var(--h,28px); opacity:.9; } }
    .now-playing { padding:20px 20px 14px; border-bottom:1px solid var(--border); min-height:88px; display:flex; flex-direction:column; justify-content:center; }
    .np-label { font-size:9px; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; margin-bottom:8px; }
    .np-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:.04em; color:var(--bright); line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:opacity .3s,transform .3s; }
    .np-title.fade { opacity:0; transform:translateY(5px); }
    .np-artist { font-size:11px; letter-spacing:.14em; color:var(--text); text-transform:uppercase; margin-top:4px; transition:opacity .3s; }
    .np-artist.fade { opacity:0; }
    .progress-wrap { padding:10px 20px 0; }
    .progress-track { height:2px; background:var(--border); }
    .progress-fill { height:100%; background:var(--accent); width:0%; transition:width .8s linear; box-shadow:0 0 8px var(--accent); }
    .progress-times { display:flex; justify-content:space-between; font-size:9px; letter-spacing:.08em; color:var(--dim); padding-top:5px; }
    .controls { display:flex; align-items:center; padding:14px 20px 18px; gap:16px; }
    .btn-play { width:48px; height:48px; border:1px solid var(--accent); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; transition:background .2s,box-shadow .2s; flex-shrink:0; }
    .btn-play::before { content:''; position:absolute; inset:3px; border:1px solid rgba(0,212,255,.2); }
    .btn-play:hover { background:rgba(0,212,255,.1); box-shadow:0 0 20px var(--glow); }
    .btn-play:active { transform:scale(.95); }
    .btn-play svg path { fill:var(--accent); }
    .vol-group { display:flex; align-items:center; gap:8px; flex:1; }
    .vol-label { font-size:9px; letter-spacing:.12em; color:var(--dim); text-transform:uppercase; flex-shrink:0; }
    input[type=range] { -webkit-appearance:none; appearance:none; flex:1; height:2px; background:var(--border); cursor:pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:10px; height:10px; background:var(--accent); border-radius:0; box-shadow:0 0 6px var(--accent); }
    input[type=range]::-moz-range-thumb { width:10px; height:10px; background:var(--accent); border:none; border-radius:0; }
    .statusbar { font-size:9px; letter-spacing:.12em; color:var(--dim); text-transform:uppercase; padding:8px 20px 10px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .statusbar.error { color:var(--accent2); }
    .queue { border-top:1px solid var(--border); padding:12px 20px 14px; }
    .queue-label { font-size:9px; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; margin-bottom:8px; }
    .queue-list { display:flex; flex-direction:column; gap:4px; }
    .queue-item { display:flex; align-items:center; gap:8px; font-size:10px; letter-spacing:.06em; color:var(--dim); padding:3px 0; border-bottom:1px solid rgba(15,27,45,.6); white-space:nowrap; overflow:hidden; }
    .queue-item.current { color:var(--text); }
    .queue-item .q-num { color:rgba(0,212,255,.3); font-size:8px; flex-shrink:0; }
    .queue-item.current .q-num { color:var(--accent); }
    .queue-item .q-name { overflow:hidden; text-overflow:ellipsis; }
    .loader { display:flex; gap:4px; align-items:center; justify-content:center; height:52px; }
    .loader span { width:4px; height:4px; background:var(--accent); animation:ldot .9s ease-in-out infinite; }
    .loader span:nth-child(2) { animation-delay:.15s; }
    .loader span:nth-child(3) { animation-delay:.30s; }
    @keyframes ldot { 0%,100%{ opacity:.15; transform:scaleY(1); } 50%{ opacity:1; transform:scaleY(2.5); } }
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="stage">
  <div class="radio" id="radio">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="radio-header">
      <div class="station-id">KSF</div>
      <div class="header-right">
        <div class="live-badge">
          <span class="live-dot" id="liveDot"></span>
          <span id="liveText">Conectando</span>
        </div>
        <div class="freq">INTERNET RADIO · 128kbps</div>
      </div>
    </div>
    <div class="waveform" id="waveform"></div>
    <div class="now-playing">
      <div class="np-label">Reproduciendo ahora</div>
      <div id="npTitle" class="np-title">
        <div class="loader"><span></span><span></span><span></span></div>
      </div>
      <div id="npArtist" class="np-artist"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-times">
        <span id="timeCurrent">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="btn-play" id="btnPlay" title="Play / Pause">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path id="playIcon" d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <div class="vol-group">
        <span class="vol-label">Vol</span>
        <input type="range" id="volSlider" min="0" max="1" step="0.02" value="0.85" />
      </div>
    </div>
    <div class="statusbar" id="statusBar">
      <span id="statusMsg">Cargando canciones…</span>
      <span id="songCount">—</span>
    </div>
    <div class="queue">
      <div class="queue-label">Historial</div>
      <div class="queue-list" id="queueList">
        <div style="font-size:10px;color:var(--dim);letter-spacing:.08em">Esperando…</div>
      </div>
    </div>
  </div>
</div>

<!-- type="module" garantiza que los imports de Firebase se resuelvan
     antes de ejecutar el código. Soluciona "firebase is not defined". -->
<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ════════════════════════════════════════════════════════════════
//  ÚNICO CAMBIO NECESARIO: pega aquí tu config real de Firebase
//  Firebase Console → ⚙️ → Tu app web → SDK setup → Config
// ════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  authDomain:        "radioksf.firebaseapp.com",
  databaseURL:       "https://radioksf-default-rtdb.firebaseio.com",
  projectId:         "radioksf",
  storageBucket:     "radioksf.appspot.com",
  messagingSenderId: "000000000000",
  appId:             "1:000000000000:web:XXXXXXXXXXXXXXXX"
};

// ── Firebase ──────────────────────────────────────────────────────
const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// ── Constantes ────────────────────────────────────────────────────
const COOLDOWN_SIZE = 5;

// ── Estado ────────────────────────────────────────────────────────
let canciones = [], cooldown = [], cancionActual = null;
let radioTimer = null, progTimer = null, paused = false;
const audio = new Audio();

// ── DOM ───────────────────────────────────────────────────────────
const radioEl      = document.getElementById("radio");
const waveform     = document.getElementById("waveform");
const npTitle      = document.getElementById("npTitle");
const npArtist     = document.getElementById("npArtist");
const progressFill = document.getElementById("progressFill");
const timeCurrent  = document.getElementById("timeCurrent");
const timeDuration = document.getElementById("timeDuration");
const btnPlay      = document.getElementById("btnPlay");
const playIcon     = document.getElementById("playIcon");
const volSlider    = document.getElementById("volSlider");
const statusMsg    = document.getElementById("statusMsg");
const statusBar    = document.getElementById("statusBar");
const songCount    = document.getElementById("songCount");
const queueList    = document.getElementById("queueList");
const liveText     = document.getElementById("liveText");

// ── Waveform bars ─────────────────────────────────────────────────
for (let i = 0; i < 52; i++) {
  const b = document.createElement("div");
  b.className = "wbar";
  b.style.setProperty("--h", (8 + Math.random() * 36) + "px");
  b.style.setProperty("--d", (0.4 + Math.random() * 0.9) + "s");
  b.style.animationDelay = (-Math.random() * 1.5) + "s";
  waveform.appendChild(b);
}

// ── Helpers ───────────────────────────────────────────────────────
const fmt = s => { const t = Math.max(0, Math.floor(s)); return Math.floor(t/60)+":"+String(t%60).padStart(2,"0"); };
const esc = s => String(s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const setStatus = (msg, err=false) => { statusMsg.textContent = msg; statusBar.className = "statusbar"+(err?" error":""); };
const setLive   = on => { liveText.textContent = on ? "En vivo" : "Esperando"; };

// ── Historial visual ──────────────────────────────────────────────
const historial = [];
function actualizarQueue(c) {
  historial.unshift(c);
  if (historial.length > 4) historial.pop();
  queueList.innerHTML = historial.map((s,i) =>
    `<div class="queue-item ${i===0?'current':''}">
      <span class="q-num">${i===0?'▶':'0'+(i+1)}</span>
      <span class="q-name">${esc(s.artista)} — ${esc(s.titulo)}</span>
    </div>`
  ).join('');
}

// Función que calcula qué canción toca AHORA MISMO a nivel mundial
function obtenerCancionGlobal() {
  // 1. Asegurarnos de que el orden sea siempre el mismo
  canciones.sort((a, b) => a.id.localeCompare(b.id));

  // 2. Sumar la duración total de tu programación (en segundos)
  const duracionTotal = canciones.reduce((suma, c) => suma + c.duracion_segundos, 0);

  // 3. Obtener la hora actual en segundos
  const tiempoActual = Math.floor(Date.now() / 1000);

  // 4. Encontrar en qué segundo del "Loop" de la radio estamos
  const segundoEnElLoop = tiempoActual % duracionTotal;

  // 5. Buscar qué canción corresponde a ese segundo
  let tiempoAcumulado = 0;
  for (let cancion of canciones) {
    if (segundoEnElLoop < tiempoAcumulado + cancion.duracion_segundos) {
      // Encontramos la canción actual. Calculamos en qué segundo exacto va.
      const offset = segundoEnElLoop - tiempoAcumulado;
      return { cancion, offset };
    }
    tiempoAcumulado += cancion.duracion_segundos;
  }
}

// ── Reproducir ────────────────────────────────────────────────────
function reproducir() {
  if (radioTimer) clearTimeout(radioTimer);
  if (progTimer)  clearInterval(progTimer);

  // Obtenemos la canción global y el segundo exacto por el que va
  const { cancion, offset } = obtenerCancionGlobal();
  cancionActual = cancion;

  npTitle.classList.add("fade");
  npArtist.classList.add("fade");
  setTimeout(() => {
    npTitle.textContent  = cancion.titulo;
    npArtist.textContent = cancion.artista;
    npTitle.classList.remove("fade");
    npArtist.classList.remove("fade");
  }, 300);

  timeDuration.textContent = fmt(cancion.duracion_segundos);
  actualizarQueue(cancion);
  setStatus(cancion.artista + " — " + cancion.titulo);

  audio.src = cancion.url_audio;
  audio.volume = parseFloat(volSlider.value);
  audio.load();

  // ADELANTAR LA CANCIÓN: Esperamos a que cargue los datos y saltamos al segundo correcto
  audio.onloadedmetadata = () => {
    audio.currentTime = offset;
  };

  audio.oncanplay = () => {
    audio.play()
      .then(onPlaying)
      .catch(() => {
        setStatus("▶  Presiona Play para sincronizar la radio");
        playIcon.setAttribute("d", "M8 5v14l11-7z");
        radioEl.classList.remove("playing");
        setLive(false);
      });
  };

  audio.onerror = () => {
    setStatus("Error de audio, sincronizando...", true);
    setTimeout(reproducir, 2500);
  };
}

function onPlaying() {
  paused = false;
  radioEl.classList.add("playing");
  playIcon.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z");
  setLive(true);

  if (progTimer) clearInterval(progTimer);
  progTimer = setInterval(() => {
    const t   = audio.currentTime;
    const dur = cancionActual.duracion_segundos || audio.duration || 1;
    progressFill.style.width = Math.min(t / dur * 100, 100) + "%";
    timeCurrent.textContent  = fmt(t);
  }, 800);

  if (radioTimer) clearTimeout(radioTimer);
  const ms = (cancionActual.duracion_segundos - audio.currentTime + 0.5) * 1000;
  radioTimer = setTimeout(() => {
    progressFill.style.width = "100%";
    setTimeout(() => reproducir(obtenerCancionGlobal()), 700);
  }, ms);
}

// ── Botón Play/Pause ──────────────────────────────────────────────
btnPlay.addEventListener("click", () => {
  if (!cancionActual) return;
  if (paused || audio.paused) {
    audio.play().then(onPlaying).catch(() => {});
  } else {
    audio.pause();
    paused = true;
    if (radioTimer) clearTimeout(radioTimer);
    if (progTimer)  clearInterval(progTimer);
    radioEl.classList.remove("playing");
    playIcon.setAttribute("d", "M8 5v14l11-7z");
    setLive(false);
  }
});

volSlider.addEventListener("input", () => { audio.volume = parseFloat(volSlider.value); });

// ── Cargar desde Firebase ─────────────────────────────────────────
setStatus("Conectando a Firebase…");
try {
  const snap = await get(ref(db, "/"));
  if (!snap.exists()) {
    setStatus("No hay canciones en la base de datos.", true);
  } else {
    const data = snap.val();
    canciones = (Array.isArray(data) ? data : Object.values(data)).filter(Boolean);
    if (!canciones.length) {
      setStatus("La lista de canciones está vacía.", true);
    } else {
      songCount.textContent = canciones.length + " canciones";
      reproducir(obtenerCancionGlobal());
    }
  }
} catch (err) {
  setStatus("Error: " + err.message, true);
  console.error(err);
}
</script>
</body>
</html>
